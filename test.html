<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毎日日本語 - 매일 일본어</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>
tailwind.config={theme:{extend:{fontFamily:{jp:['Noto Sans JP','sans-serif'],kr:['Noto Sans KR','sans-serif']},colors:{bg:'#F7F3ED',fg:'#1A1A1A',muted:'#8C8577',accent:'#C41E3A','accent-light':'#F5E6E9',card:'#FFFFFF',border:'#E5DDD3'}}}}
</script>
<style>
:root{--bg:#F7F3ED;--fg:#1A1A1A;--muted:#8C8577;--accent:#C41E3A;--accent-light:#F5E6E9;--card:#FFF;--border:#E5DDD3}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Noto Sans JP',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(196,30,58,0.04),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(196,30,58,0.03),transparent 60%);pointer-events:none;z-index:0}

/* 스크롤바 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* 탭 */
.tab-btn{position:relative;padding:12px 20px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;transition:color .3s;white-space:nowrap}
.tab-btn::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:3px;background:var(--accent);border-radius:2px;transition:all .3s;transform:translateX(-50%)}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{width:70%}
.tab-btn:hover{color:var(--accent)}

/* 섹션 */
.section{display:none;animation:fadeUp .4s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* 카드 */
.learn-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .3s;position:relative;overflow:hidden}
.learn-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transition:transform .3s;transform-origin:left}
.learn-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.08)}
.learn-card:hover::before{transform:scaleX(1)}

/* 발음 버튼 */
.speak-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.speak-btn:hover{background:var(--accent);color:#fff;transform:scale(1.1)}
.speak-btn:active{transform:scale(0.95)}

/* 글자 카드 */
.kana-card{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .25s;position:relative}
.kana-card:hover{border-color:var(--accent);transform:scale(1.05);box-shadow:0 4px 16px rgba(196,30,58,0.12)}
.kana-card .kana-char{font-family:'Noto Sans JP',sans-serif;font-size:28px;font-weight:700;line-height:1}
.kana-card .kana-pron{font-size:11px;color:var(--muted);margin-top:4px}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-content{background:var(--card);border-radius:20px;padding:32px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;transform:scale(0.9);transition:transform .3s}
.modal-overlay.show .modal-content{transform:scale(1)}

/* 캔버스 */
#practiceCanvas{border:2px dashed var(--border);border-radius:12px;cursor:crosshair;touch-action:none;background:#FEFCF9}

/* 퀴즈 */
.quiz-option{padding:16px 24px;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;font-size:18px;font-weight:600;text-align:center}
.quiz-option:hover{border-color:var(--accent);background:var(--accent-light)}
.quiz-option.correct{border-color:#22C55E;background:#F0FDF4;color:#166534}
.quiz-option.wrong{border-color:#EF4444;background:#FEF2F2;color:#991B1B}
.quiz-option.disabled{pointer-events:none;opacity:0.6}

/* 상황 카드 */
.situation-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .3s}
.situation-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.1)}
.situation-icon-area{height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

/* 대화 말풍선 */
.dialogue-bubble{padding:14px 18px;border-radius:16px;max-width:85%;position:relative;animation:fadeUp .3s ease}
.dialogue-bubble.staff{background:#F0E7E9;border-bottom-left-radius:4px;margin-right:auto}
.dialogue-bubble.customer{background:#EDF2F7;border-bottom-right-radius:4px;margin-left:auto}
.dialogue-bubble .speaker{font-size:12px;font-weight:700;margin-bottom:4px}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--fg);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;font-weight:500;z-index:200;transition:transform .4s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 진도 바 */
.progress-ring{transition:stroke-dashoffset .5s ease}

/* 일본 전통 물결 패턴 */
.wave-pattern{position:absolute;bottom:0;left:0;right:0;height:40px;opacity:0.06}

@media(max-width:640px){
  .kana-card .kana-char{font-size:20px}
  .tab-btn{padding:10px 14px;font-size:13px}
  .learn-card{padding:18px}
  .modal-content{padding:20px}
}
</style>
</head>
<body class="min-h-screen relative">

<!-- 헤더 -->
<header class="relative z-10 pt-8 pb-4 px-4 text-center">
  <div class="flex items-center justify-center gap-3 mb-2">
    <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center">
      <span class="text-white font-jp font-black text-lg">日</span>
    </div>
    <h1 class="font-jp font-black text-3xl tracking-tight" style="color:var(--fg)">毎日日本語</h1>
  </div>
  <p class="text-muted text-sm font-kr">하루에 하나씩, 진짜 쓰는 일본어</p>
  <p id="todayDate" class="text-xs text-muted mt-1 font-kr"></p>
</header>

<!-- 탭 네비게이션 -->
<nav class="sticky top-0 z-50 bg-bg/90 backdrop-blur-md border-b border-border">
  <div class="max-w-3xl mx-auto flex overflow-x-auto px-2 gap-1" id="tabNav">
    <button class="tab-btn active font-kr" data-tab="daily">오늘의 학습</button>
    <button class="tab-btn font-kr" data-tab="hiragana">히라가나</button>
    <button class="tab-btn font-kr" data-tab="katakana">가타카나</button>
    <button class="tab-btn font-kr" data-tab="situations">상황 회화</button>
    <button class="tab-btn font-kr" data-tab="quiz">퀴즈</button>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<main class="max-w-3xl mx-auto px-4 py-6 relative z-10">

  <!-- 오늘의 학습 -->
  <section id="sec-daily" class="section active"></section>

  <!-- 히라가나 -->
  <section id="sec-hiragana" class="section"></section>

  <!-- 가타카나 -->
  <section id="sec-katakana" class="section"></section>

  <!-- 상황 회화 -->
  <section id="sec-situations" class="section"></section>

  <!-- 퀴즈 -->
  <section id="sec-quiz" class="section"></section>

</main>

<!-- 글자 상세 모달 -->
<div class="modal-overlay" id="kanaModal">
  <div class="modal-content" id="kanaModalContent"></div>
</div>

<!-- 상황 대화 모달 -->
<div class="modal-overlay" id="situationModal">
  <div class="modal-content" id="situationModalContent"></div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ===== 유틸리티 =====
function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getTodayIndex() {
  const now = new Date();
  const start = new Date(2025, 0, 1);
  return Math.floor((now - start) / 86400000);
}

// 날짜 표시
document.getElementById('todayDate').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

// ===== 데이터: 오늘의 표현 (10일치 x 5개) =====
const dailyData = [
  [ // Day 0: 기본 인사
    {ja:'こんにちは',ko:'콘니치와',mean:'안녕하세요',tip:'낮 10시~저녁 6시 사이에 쓰는 인사'},
    {ja:'おはようございます',ko:'오하요오 고자이마스',mean:'좋은 아침입니다',tip:'아침 인사. 친한 사이엔 "おはよう"만'},

  ],
  [ // Day 1: 감사와 사과
    {ja:'どういたしまして',ko:'도오 이타시마시테',mean:'천만에요',tip:"감사에 대한 답례"},
    {ja:'すみません',ko:'스미마센',mean:'죄송합니다 / 실례합니다',tip:'사과뿐 아니라 주의 끌 때도 사용'},
    {ja:'ごめんなさい',ko:'고멘나사이',mean:'미안합니다',tip:'스미마센보다 더 사적인 사과'},
    {ja:'いいえ',ko:'이이에',mean:'아니에요',tip:"사과나 감사에 대한 겸손한 대답"},
    {ja:'本当にありがとうございます',ko:'혼토오니 아리가토오 고자이마스',mean:'정말 감사합니다',tip:'더 깊은 감사를 표현할 때'}
  ],
  [ // Day 2: 자기소개
    {ja:'はじめまして',ko:'하지메마시테',mean:'처음 뵙겠습니다',tip:'처음 만난 사람에게 반드시'},
    {ja:'私(わたし)は___です',ko:'와타시와 ___ 데스',mean:'저는 ___입니다',tip:'___에 이름 넣기. 남자는 僕(ぼく)도 씀'},
    {ja:'どうぞよろしくお願いします',ko:'도오조 요로시쿠 오네가이시마스',mean:'잘 부탁드립니다',tip:'자기소개 끝에 필수! 약줄여서 "よろしく"도 씀'},

    {ja:'温(あた)めますか',ko:'아타메마스까',mean:'데워드릴까요?',tip:'편의점에서 자주 듣는 질문'},
    {ja:'はい、お願(ねが)いします',ko:'하이, 오네가이시마스',mean:'네, 부탁합니다',tip:'물건 데우기, 봉투 등 "네"로 대답'},

  ],
  [ // Day 5: 쇼핑
    {ja:'見(み)てもいいですか',ko:'미테모 이이 데스까',mean:'봐도 될까요?',tip:'물건을 만져보거나 확인할 때'},
    {ja:'試着(しちゃく)してもいいですか',ko:'시챠쿠시테모 이이 데스까',mean:'입어봐도 될까요?',tip:'옷 가게에서 필수 표현'},
    {ja:'もっと大(おお)きいのはありますか',ko:'못토 오오키이노와 아리마스까',mean:'더 큰 거 있어요?',tip:'사이즈 조절할 때'},
    {ja:'これで買(か)います',ko:'코레데 카이마스',mean:'이걸로 살게요',tip:'결정하고 구매할 때'},
    {ja:'クレジットカード使(つか)えますか',ko:'쿠레짓토카아도 츠카에마스까',mean:'카드 쓸 수 있어요?',tip:'결제 수단 확인'}
  ],
  [ // Day 6: 길 찾기
    {ja:'___はどこですか',ko:'___와 도코 데스까',mean:'___는 어디예요?',tip:'장소 이름을 ___에 넣기'},
    {ja:'駅(えき)はどこですか',ko:'에키와 도코 데스까',mean:'역은 어디예요?',tip:'가장 많이 쓰는 길 찾기'},
    {ja:'どうやって行(い)きますか',ko:'도오얏테 이키마스까',mean:'어떻게 가나요?',tip:'방법을 물어볼 때'},
    {ja:'まっすぐ行(い)ってください',ko:'맛스구 잇테 쿠다사이',mean:'직진하세요',tip:'길 안내에서 가장 흔한 표현'},
    {ja:'右(みぎ)に曲(ま)がってください',ko:'미기니 마갓테 쿠다사이',mean:'오른쪽으로 도세요',tip:'左(ひだり)=왼쪽, 右(みぎ)=오른쪽'}

    {ja:'Wi-Fiのパスワードは何(なん)ですか',ko:'와이파이노 파스와아도와 난 데스까',mean:'와이파이 비번이 뭐예요?',tip:'현대 여행에서 필수!'},

// ===== 데이터: 히라가나 =====

// ===== 필기 연습 캔버스 =====
let canvasCtx, isDrawing = false;

function initCanvas() {
  const canvas = document.getElementById('practiceCanvas');
  if (!canvas) return;
  canvasCtx = canvas.getContext('2d');
  canvasCtx.lineWidth = 4;
  canvasCtx.lineCap = 'round';
  canvasCtx.lineJoin = 'round';
  canvasCtx.strokeStyle = '#C41E3A';

  // 마우스 이벤트
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);

  // 터치 이벤트
  canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(getTouchPos(e, canvas)); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(getTouchPos(e, canvas)); }, {passive:false});
  canvas.addEventListener('touchend', stopDraw);
}

function getTouchPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  return { offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top };
}

function startDraw(e) {
  isDrawing = true;
  canvasCtx.beginPath();
  canvasCtx.moveTo(e.offsetX, e.offsetY);
}

function draw(e) {
  if (!isDrawing) return;
  canvasCtx.lineTo(e.offsetX, e.offsetY);
  canvasCtx.stroke();
}

function stopDraw() { isDrawing = false; }

function clearCanvas() {
  const canvas = document.getElementById('practiceCanvas');
  if (!canvas || !canvasCtx) return;
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
}

function startQuiz(mode) {
  quizState = { mode, current: 0, score: 0, total: 10, questions: [], answered: false };

  // 문제 생성
  const hData = hiraganaBasic.map(d => ({char:d[0], pron:d[1], type:'hiragana'}));
  const kData = katakanaBasic.map(d => ({char:d[0], pron:d[1], type:'katakana'}));
  const dH = hiraganaDakuten.map(d => ({char:d[0], pron:d[1], type:'hiragana'}));
  const dK = katakanaDakuten.map(d => ({char:d[0], pron:d[1], type:'katakana'}));
  let pool = mode === 'hiragana' ? [...hData,...dH] : mode === 'katakana' ? [...kData,...dK] : [...hData,...dH,...kData,...dK];

  // 중복 발음 제거 (같은 발음이면 하나만)
  const seen = new Set();
  pool = pool.filter(d => {
    if (seen.has(d.pron)) return false;
    seen.add(d.pron);
    return true;
  });

  // 10개 랜덤 선택
  for (let i = 0; i < 10 && pool.length > 0; i++) {
    const ri = Math.floor(Math.random() * pool.length);
    const correct = pool.splice(ri, 1)[0];

    // 오답 보기 3개 생성
    const allProns = [...new Set([...hData,...kData,...dH,...dK].map(d=>d.pron))];
    const wrongProns = allProns.filter(p => p !== correct.pron);
    const shuffled = wrongProns.sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [...shuffled, correct.pron].sort(() => Math.random() - 0.5);

    quizState.questions.push({ char: correct.char, correctPron: correct.pron, type: correct.type, options });
  }

  document.getElementById('quizSetup').classList.add('hidden');
  document.getElementById('quizPlay').classList.remove('hidden');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.current];
  const play = document.getElementById('quizPlay');
  quizState.answered = false;

  const progress = ((quizState.current) / quizState.total) * 100;

  play.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm font-bold font-kr text-muted">문제 ${quizState.current + 1} / ${quizState.total}</p>
      <p class="text-sm font-bold font-kr text-accent">정답: ${quizState.score}</p>
    </div>
    <div class="w-full h-2 bg-border rounded-full mb-8 overflow-hidden">
      <div class="h-full bg-accent rounded-full transition-all duration-500" style="width:${progress}%"></div>
    </div>

    <div class="text-center mb-8">
      <p class="text-xs text-muted mb-2 font-kr">${q.type === 'hiragana' ? '히라가나' : '가타카나'}</p>
      <div class="inline-flex items-center justify-center w-36 h-36 rounded-3xl bg-accent-light">
        <span class="font-jp text-8xl font-black text-accent">${q.char}</span>
      </div>
      <button onclick="speak('${q.char}')" class="block mx-auto mt-4 speak-btn">
        <i class="fa-solid fa-volume-high text-sm"></i>
      </button>
    </div>

    <div class="grid grid-cols-2 gap-3" id="quizOptions">
      ${q.options.map(opt => `
        <div class="quiz-option font-kr" onclick="checkAnswer(this,'${opt}','${q.correctPron}')">${opt}</div>
      `).join('')}
    </div>
  `;
}

function checkAnswer(el, selected, correct) {
  if (quizState.answered) return;
  quizState.answered = true;

  const options = document.querySelectorAll('#quizOptions .quiz-option');
  options.forEach(opt => {
    opt.classList.add('disabled');
    if (opt.textContent === correct) opt.classList.add('correct');
    if (opt === el && selected !== correct) opt.classList.add('wrong');
  });

  if (selected === correct) {
    quizState.score++;
    showToast('정답입니다!');
  } else {
    showToast(`오답! 정답은 "${correct}" 입니다`);
  }

  setTimeout(() => {
    quizState.current++;
    if (quizState.current < quizState.total) {
      renderQuizQuestion();
    } else {
      showQuizResult();
    }
  }, 1500);
}

function showQuizResult() {
  document.getElementById('quizPlay').classList.add('hidden');
  const result = document.getElementById('quizResult');
  result.classList.remove('hidden');

  const pct = Math.round((quizState.score / quizState.total) * 100);
  const msg = pct >= 90 ? '훌륭합니다! 거의 완벽해요!' : pct >= 70 ? '잘하고 있어요! 조금만 더!' : pct >= 50 ? '괜찮아요! 반복하면 늘어요!' : '천천히 다시 해보세요!';

  result.innerHTML = `
    <div class="text-center py-8">
      <div class="inline-flex items-center justify-center w-32 h-32 rounded-full mb-6" style="background:${pct>=70?'#F0FDF4':'#FEF2F2'}">
        <div>
          <p class="text-4xl font-black" style="color:${pct>=70?'#22C55E':'#EF4444'}">${quizState.score}</p>
          <p class="text-sm text-muted font-kr">/ ${quizState.total}</p>
        </div>
      </div>
      <h3 class="text-2xl font-black font-kr mb-2">${msg}</h3>
      <p class="text-muted font-kr">정답률 ${pct}%</p>

      <div class="flex gap-3 justify-center mt-8">
        <button onclick="renderQuiz()" class="px-6 py-3 border-2 border-border rounded-xl font-bold font-kr hover:bg-gray-50 transition">
          <i class="fa-solid fa-arrow-left mr-2"></i>돌아가기
        </button>
        <button onclick="startQuiz('${quizState.mode}')" class="px-6 py-3 bg-accent text-white rounded-xl font-bold font-kr hover:bg-red-700 transition">
          <i class="fa-solid fa-rotate-right mr-2"></i>다시 풀기
        </button>
      </div>
    </div>
  `;
}

(function initParticles() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4';
  document.body.prepend(canvas);
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {

  }
  resize();
  window.addEventListener('resize', resize);

  // 일본 느낌의 부유하는 원형 파티클
  for (let i = 0; i < 20; i++) {
    particles.push({

      r: Math.random() * 3 + 1,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.3 + 0.1
    });
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(196, 30, 58, ${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }

  // 접근성: 모션 감소 설정 시 애니메이션 중지
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    animate();
  }
})();
</script>
</body>
</html>
